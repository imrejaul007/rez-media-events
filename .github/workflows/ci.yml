name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: false

      - run: npm run lint

      - run: npm run build

      - run: npm test
